<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Settings')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <h1>Settings</h1>
    <p th:if="${param.deleted != null}">Local imported data was deleted.</p>
    <form th:action="@{/settings/delete-data}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="danger">Delete Imported Local Data</button>
    </form>
</main>
</body>
</html>
