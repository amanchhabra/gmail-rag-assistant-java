<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Ask')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <h1>Ask Your Mailbox</h1>
    <form th:action="@{/ask}" method="post" class="stack">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>Question
            <textarea name="question" rows="4" th:text="${question}"></textarea>
        </label>
        <button type="submit">Ask</button>
    </form>
    <section th:if="${answer != null}">
        <h2>Answer</h2>
        <p class="answer" th:text="${answer.answer()}"></p>
        <p>Evidence: <strong th:text="${answer.evidenceStatus()}"></strong></p>
        <h2>Sources</h2>
        <article th:each="source : ${answer.sources()}">
            <h3 th:text="${source.subject()}"></h3>
            <p><strong th:text="${source.sender()}"></strong> <span th:text="${source.sentAt()}"></span></p>
            <p th:text="${source.excerpt()}"></p>
            <p>Score: <span th:text="${#numbers.formatDecimal(source.retrievalScore(), 1, 3)}"></span></p>
            <a th:href="${source.gmailUrl()}" target="_blank" rel="noopener">Open in Gmail</a>
        </article>
    </section>
</main>
</body>
</html>
